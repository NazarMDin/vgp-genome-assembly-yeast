<svg width="100%" viewBox="0 0 680 780" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>VGP Genome Assembly Pipeline Overview</title>
  <desc>Flowchart showing the eight main steps of the VGP genome assembly pipeline from raw reads to final scaffolded assembly</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t  { font-family: sans-serif; font-size: 14px; font-weight: 400; fill: #3d3d3a; }
      .th { font-family: sans-serif; font-size: 14px; font-weight: 500; fill: #3d3d3a; }
      .ts { font-family: sans-serif; font-size: 12px; font-weight: 400; fill: #73726c; }
      @media (prefers-color-scheme: dark) {
        .t, .th { fill: #c2c0b6; }
        .ts { fill: #9c9a92; }
      }
    </style>
  </defs>

  <!-- Step 1: Data Upload -->
  <rect x="190" y="20" width="300" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="340" y="44" text-anchor="middle" dominant-baseline="central">1. Data upload &amp; organisation</text>
  <text class="ts" x="340" y="63" text-anchor="middle">HiFi FASTA · Hi-C FASTQ · Bionano CMAP</text>

  <!-- Arrow -->
  <line x1="340" y1="76" x2="340" y2="106" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 2: Preprocessing -->
  <rect x="190" y="110" width="300" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="340" y="134" text-anchor="middle" dominant-baseline="central">2. Adapter removal (Cutadapt)</text>
  <text class="ts" x="340" y="153" text-anchor="middle">Discard HiFi reads containing adapter sequences</text>

  <!-- Arrow -->
  <line x1="340" y1="166" x2="340" y2="196" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 3: K-mer profiling -->
  <rect x="190" y="200" width="300" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="340" y="224" text-anchor="middle" dominant-baseline="central">3. Genome profiling (Meryl + GenomeScope2)</text>
  <text class="ts" x="340" y="243" text-anchor="middle">Genome size ~11.7 Mb · Heterozygosity ~0.58%</text>

  <!-- Arrow -->
  <line x1="340" y1="256" x2="340" y2="286" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 4: Assembly -->
  <rect x="190" y="290" width="300" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="340" y="314" text-anchor="middle" dominant-baseline="central">4. Contig assembly (hifiasm Hi-C mode)</text>
  <text class="ts" x="340" y="333" text-anchor="middle">Hap1 + Hap2 GFA graphs → FASTA</text>

  <!-- Arrow -->
  <line x1="340" y1="346" x2="340" y2="376" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 5: Evaluation -->
  <rect x="190" y="380" width="300" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th" x="340" y="404" text-anchor="middle" dominant-baseline="central">5. Assembly evaluation</text>
  <text class="ts" x="340" y="423" text-anchor="middle">gfastats · BUSCO · Merqury</text>

  <!-- Arrow -->
  <line x1="340" y1="436" x2="340" y2="466" stroke="#854F0B" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 6: Bionano -->
  <rect x="190" y="470" width="300" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="340" y="494" text-anchor="middle" dominant-baseline="central">6. Bionano scaffolding</text>
  <text class="ts" x="340" y="513" text-anchor="middle">Optical map hybrid scaffold</text>

  <!-- Arrow -->
  <line x1="340" y1="526" x2="340" y2="556" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 7: YaHS -->
  <rect x="190" y="560" width="300" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="340" y="584" text-anchor="middle" dominant-baseline="central">7. Hi-C scaffolding (YaHS)</text>
  <text class="ts" x="340" y="603" text-anchor="middle">Chromosome-scale scaffolds</text>

  <!-- Arrow -->
  <line x1="340" y1="616" x2="340" y2="646" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 8: Final QC -->
  <rect x="190" y="650" width="300" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text class="th" x="340" y="674" text-anchor="middle" dominant-baseline="central">8. Final QC (Pretext contact maps)</text>
  <text class="ts" x="340" y="693" text-anchor="middle">17 scaffolds · matches S. cerevisiae reference</text>

  <!-- Side labels -->
  <text class="ts" x="100" y="170" text-anchor="middle" fill="#185FA5">Pre-processing</text>
  <text class="ts" x="100" y="230" text-anchor="middle" fill="#0F6E56">Profiling</text>
  <text class="ts" x="100" y="320" text-anchor="middle" fill="#534AB7">Assembly</text>
  <text class="ts" x="100" y="410" text-anchor="middle" fill="#854F0B">QC</text>
  <text class="ts" x="100" y="530" text-anchor="middle" fill="#993C1D">Scaffolding</text>
  <text class="ts" x="100" y="680" text-anchor="middle" fill="#3B6D11">Final QC</text>

  <!-- Bracket lines for side labels -->
  <line x1="148" y1="110" x2="148" y2="166" stroke="#185FA5" stroke-width="0.5" opacity="0.5"/>
  <line x1="148" y1="200" x2="148" y2="256" stroke="#0F6E56" stroke-width="0.5" opacity="0.5"/>
  <line x1="148" y1="290" x2="148" y2="346" stroke="#534AB7" stroke-width="0.5" opacity="0.5"/>
  <line x1="148" y1="380" x2="148" y2="436" stroke="#854F0B" stroke-width="0.5" opacity="0.5"/>
  <line x1="148" y1="470" x2="148" y2="616" stroke="#993C1D" stroke-width="0.5" opacity="0.5"/>
  <line x1="148" y1="650" x2="148" y2="706" stroke="#3B6D11" stroke-width="0.5" opacity="0.5"/>
</svg>
